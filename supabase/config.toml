# Supabase configuration for Companion app

project_id = "oprsmhyvihrahxpfvdih"

[auth]
site_url = "https://companion.myappbuddy.com.au"
additional_redirect_urls = ["https://companion.myappbuddy.com.au/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.hook.send_email]
enabled = true
uri = "https://oprsmhyvihrahxpfvdih.supabase.co/functions/v1/auth-email-hook"
secrets = "env(SEND_EMAIL_HOOK_SECRET)"

# These functions do their own auth (they read the Authorization header and
# fail closed) and are called cross-origin from the browser, so the platform
# JWT gate must be OFF — otherwise it 401s the CORS preflight before the
# function runs. Deploy them with `--no-verify-jwt`; this records that intent
# so a config-driven redeploy can't silently re-enable the gate.
[functions.check-features]
verify_jwt = false

[functions.check-plan]
verify_jwt = false
