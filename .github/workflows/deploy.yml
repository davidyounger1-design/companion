name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set up Hostinger SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_myappbuddy
          chmod 600 ~/.ssh/hostinger_myappbuddy
          ssh-keyscan -p 65002 153.92.11.14 >> ~/.ssh/known_hosts

      - name: Deploy to companion.myappbuddy.com.au
        run: bash deploy.sh live
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Declare this app's candidate features to MyAppBuddy (the single source of
      # truth for which plan includes which feature). Idempotent: known keys are
      # a no-op; a brand-new key is created "included in no plan" and waits for an
      # admin to assign it to tiers. Self-skips if the publish key isn't set, and
      # never fails the deploy.
      - name: Publish feature manifest to MyAppBuddy
        env:
          MAB_PUBLISH_KEY: ${{ secrets.MAB_PUBLISH_KEY }}
        run: |
          if [ -z "${MAB_PUBLISH_KEY}" ]; then
            echo "MAB_PUBLISH_KEY not set — skipping feature manifest publish."
            exit 0
          fi
          echo "=== Manifest being sent ==="
          cat mab-features.json
          echo ""
          echo "=== POST /api/v1/apps/companion/features/publish ==="
          http_code=$(curl -sS -o /tmp/pub_resp.txt -w "%{http_code}" -X POST \
            "https://myappbuddy.com.au/api/v1/apps/companion/features/publish" \
            -H "Authorization: Bearer ${MAB_PUBLISH_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"features\": $(cat mab-features.json)}")
          echo "HTTP status: ${http_code}"
          echo "=== Response body ==="
          cat /tmp/pub_resp.txt || true
          echo ""
          echo "=== DIAGNOSTIC: forcing step to fail so the above is captured in logs ==="
          exit 1
