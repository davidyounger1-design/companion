<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
    <meta name="theme-color" content="#6f8c78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Companion" />
    <title>Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- MAB embed widgets — loaded eagerly so custom elements are registered
         before the user navigates to the Help & Feedback page. Static script
         tags are handled correctly in iOS PWA standalone mode, unlike
         dynamically injected ones. -->
    <script defer id="mab-support" src="https://myappbuddy.com.au/embed/support.js"></script>
    <script defer id="mab-ideas" src="https://myappbuddy.com.au/embed/ideas.js"></script>
    <!-- Bundle that provides the subscription embeds (myappbuddy-license-manager,
         myappbuddy-pricing-table) used on the Subscription screen. Its defines
         are guarded, so it coexists with support.js/ideas.js above. -->
    <script defer id="mab-v1" src="https://myappbuddy.com.au/embed/v1.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
